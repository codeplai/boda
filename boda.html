<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma &amp; Gerhard — 26 décembre 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ivoire:#FBF6F0; --creme:#FFFDFA;
    --bordeaux:#722F37; --bordeaux-deep:#511F26;
    --rose:#DCA8A1; --rose-pale:#F3DEDA;
    --sauge:#8A9B7C; --sauge-pale:#DCE4D4;
    --or:#C5A059; --or-pale:#E9D9BC;
    --ink:#3A282B;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Jost',sans-serif;font-weight:300;color:var(--ink);background:var(--ivoire);line-height:1.7;overflow-x:hidden}
  h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:500}
  .script{font-family:'Pinyon Script',cursive;font-weight:400}
  .eyebrow{font-size:.7rem;letter-spacing:.34em;text-transform:uppercase;color:var(--or);font-weight:500}
  img{max-width:100%;display:block}

  /* ============ NAV ============ */
  nav{position:sticky;top:0;z-index:100;background:rgba(251,246,240,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--or-pale);display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.8rem clamp(1rem,4vw,3rem)}
  nav .mono{font-family:'Pinyon Script',cursive;color:var(--bordeaux);font-size:1.9rem;line-height:1}
  nav ul{display:flex;gap:clamp(.9rem,2.2vw,2rem);list-style:none;align-items:center}
  nav a{color:var(--bordeaux);text-decoration:none;font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;padding-bottom:3px;border-bottom:1px solid transparent;transition:border-color .25s}
  nav a:hover,nav a:focus-visible{border-color:var(--or);outline:none}
  .lang-switch{display:flex;border:1px solid var(--or-pale);border-radius:99px;overflow:hidden;flex-shrink:0}
  .lang-switch button{background:none;border:none;padding:.4rem .85rem;font-family:'Jost',sans-serif;font-size:.74rem;letter-spacing:.12em;color:var(--bordeaux);cursor:pointer;transition:all .25s}
  .lang-switch button.active{background:var(--bordeaux);color:var(--creme)}
  .edit-pencil{background:none;border:1px solid var(--or-pale);border-radius:50%;width:34px;height:34px;color:var(--bordeaux);cursor:pointer;font-size:1rem;transition:all .25s;flex-shrink:0}
  .edit-pencil:hover{background:var(--or);color:var(--creme);border-color:var(--or)}
  #code-pop{display:none;position:fixed;top:64px;right:clamp(1rem,4vw,3rem);z-index:150;background:var(--creme);border:1px solid var(--or-pale);box-shadow:0 20px 50px -25px rgba(81,31,38,.5);padding:1.2rem;flex-direction:column;gap:.7rem;width:min(280px,90vw)}
  #code-pop input{border:1px solid var(--or-pale);background:var(--ivoire);padding:.7rem .9rem;font-family:'Jost',sans-serif;font-size:.95rem}
  #code-pop button{background:var(--bordeaux);color:var(--creme);border:none;padding:.7rem;cursor:pointer;letter-spacing:.15em;text-transform:uppercase;font-size:.72rem;font-family:'Jost',sans-serif}
  #code-msg{font-size:.8rem;color:#7C3127;min-height:1em}
  .edit-only{display:none !important}
  body.editing .edit-only.block{display:block !important}
  body.editing .edit-only.inline{display:inline-block !important}
  body.editing [contenteditable="true"]{outline:1.5px dashed var(--or);outline-offset:4px;cursor:text;border-radius:2px}
  body.editing [contenteditable="true"]:focus{outline-style:solid;background:rgba(233,217,188,.25)}
  #edit-banner{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bordeaux);color:var(--creme);display:flex;gap:.9rem;align-items:center;justify-content:center;flex-wrap:wrap;padding:.9rem 1rem;font-size:.85rem;box-shadow:0 -10px 30px -15px rgba(81,31,38,.6)}
  #edit-banner button{background:var(--or);border:1px solid var(--or);color:var(--creme);padding:.6rem 1.2rem;cursor:pointer;letter-spacing:.12em;text-transform:uppercase;font-size:.7rem;font-family:'Jost',sans-serif}
  #edit-banner button.ghost{background:transparent;border-color:var(--creme)}
  body.editing{padding-bottom:70px}
  .post-date{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--or);margin-bottom:.3rem}
  .post-del{background:none;border:1px solid var(--rose);color:#7C3127;padding:.25rem .7rem;font-size:.72rem;cursor:pointer;margin-top:.7rem;font-family:'Jost',sans-serif;letter-spacing:.1em}
  .frame .ph{position:relative;overflow:hidden}
  .frame .ph img{width:100%;height:100%;object-fit:cover}
  body.editing .frame .ph{cursor:pointer;outline:1.5px dashed var(--or);outline-offset:3px}
  input[type=file]{width:100%;border:1px dashed var(--or-pale);background:var(--ivoire);padding:.8rem;font-family:'Jost',sans-serif;font-size:.9rem;font-weight:300}
  .custom-img{border:1px solid var(--or-pale);padding:.8rem;background:var(--creme);box-shadow:0 16px 40px -28px rgba(81,31,38,.5);margin:1.6rem 0;max-width:720px}
  .custom-txt{white-space:pre-line;max-width:44rem}
  .burger{display:none;background:none;border:none;cursor:pointer;width:42px;height:42px;position:relative}
  .burger span{position:absolute;left:9px;right:9px;height:2px;background:var(--bordeaux);transition:all .3s}
  .burger span:nth-child(1){top:14px}.burger span:nth-child(2){top:20px}.burger span:nth-child(3){top:26px}
  .burger.open span:nth-child(1){top:20px;transform:rotate(45deg)}
  .burger.open span:nth-child(2){opacity:0}
  .burger.open span:nth-child(3){top:20px;transform:rotate(-45deg)}
  @media(max-width:860px){
    .burger{display:block}
    nav ul{position:fixed;inset:62px 0 auto 0;background:var(--ivoire);border-bottom:1px solid var(--or-pale);flex-direction:column;align-items:center;gap:0;max-height:0;overflow:hidden;transition:max-height .4s ease}
    nav ul.open{max-height:380px;box-shadow:0 20px 30px -20px rgba(81,31,38,.3)}
    nav ul li{width:100%;text-align:center}
    nav ul a{display:block;padding:1rem;border-bottom:1px solid var(--rose-pale)}
  }

  /* ============ ORNEMENTS ============ */
  .corner{position:absolute;width:clamp(120px,24vw,300px);height:auto;pointer-events:none;opacity:.95}
  .corner.tl{top:-12px;left:-12px}
  .corner.br{bottom:-12px;right:-12px;transform:rotate(180deg)}
  .divider{display:flex;align-items:center;justify-content:center;gap:.9rem;margin:2rem auto;color:var(--or)}
  .divider::before,.divider::after{content:"";height:1px;width:min(90px,20vw);background:linear-gradient(90deg,transparent,var(--or))}
  .divider::after{background:linear-gradient(90deg,var(--or),transparent)}

  /* ============ HERO + CARTE APPLE-STYLE ============ */
  .hero-zone{position:relative;height:185vh;background:
    radial-gradient(ellipse 70% 50% at 50% 30%, rgba(220,168,161,.22), transparent 70%),
    radial-gradient(ellipse 50% 40% at 8% -8%, rgba(138,155,124,.13), transparent 70%),
    var(--ivoire)}
  .hero-sticky{position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .invite-card{will-change:transform,opacity;background:var(--creme);border:1px solid var(--or-pale);box-shadow:0 40px 90px -40px rgba(81,31,38,.55);padding:clamp(2.2rem,6vw,4.5rem) clamp(1.6rem,6vw,5rem);text-align:center;position:relative;max-width:min(680px,90vw)}
  .invite-card::before{content:"";position:absolute;inset:10px;border:1px solid var(--or);pointer-events:none;opacity:.65}
  .invite-card .pre{font-size:clamp(1.5rem,3.8vw,2.3rem);color:var(--rose)}
  .invite-card h1{font-size:clamp(2.4rem,7.5vw,5.2rem);line-height:1.05;color:var(--bordeaux)}
  .invite-card .amp{font-family:'Pinyon Script',cursive;font-size:clamp(1.8rem,4.4vw,3.2rem);color:var(--or);display:block;margin:.08em 0}
  .invite-card .lede{max-width:32rem;font-size:clamp(.92rem,2.3vw,1.05rem);margin:1.2rem auto 0}
  .scroll-hint{position:absolute;bottom:4vh;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;color:var(--bordeaux);font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;opacity:.75}
  .scroll-hint svg{animation:bob 1.8s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
  @media (prefers-reduced-motion: reduce){
    .hero-zone{height:auto;padding:14vh 0}
    .hero-sticky{position:static;height:auto}
    .scroll-hint svg{animation:none}
  }

  .btn{display:inline-block;margin-top:2rem;background:var(--bordeaux);color:var(--creme);text-decoration:none;padding:1rem 2.6rem;letter-spacing:.22em;text-transform:uppercase;font-size:.74rem;border:1px solid var(--bordeaux);cursor:pointer;transition:all .3s;font-family:'Jost',sans-serif}
  .btn:hover,.btn:focus-visible{background:transparent;color:var(--bordeaux);outline:none}
  .btn.gold{background:var(--or);border-color:var(--or)}
  .btn.gold:hover{background:transparent;color:var(--or)}
  .btn:disabled{opacity:.5;cursor:wait}

  section{padding:clamp(3.5rem,8vw,6rem) clamp(1.2rem,6vw,4rem);max-width:1150px;margin:0 auto;position:relative}
  section > h2{font-size:clamp(2rem,5vw,3.1rem);color:var(--bordeaux);margin:.3rem 0 .6rem}
  .section-intro{max-width:40rem;margin-bottom:2.6rem}

  /* ============ GALERIE ============ */
  .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:1.2rem}
  .frame{background:var(--creme);padding:.9rem .9rem 2.4rem;border:1px solid var(--or-pale);box-shadow:0 16px 40px -28px rgba(81,31,38,.5);transform:rotate(var(--tilt,0deg));transition:transform .35s}
  .frame:hover{transform:rotate(0) scale(1.02)}
  .frame:nth-child(odd){--tilt:-1.4deg}
  .frame:nth-child(even){--tilt:1.2deg}
  .frame .ph{aspect-ratio:4/5;background:linear-gradient(150deg,var(--rose-pale),var(--or-pale) 55%,var(--sauge-pale));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;color:var(--bordeaux);text-align:center;padding:1rem}
  .frame .ph p{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase}
  .frame figcaption{font-family:'Pinyon Script',cursive;font-size:1.3rem;color:var(--bordeaux);text-align:center;margin-top:.7rem}

  /* ============ PROGRAMME ============ */
  .programme{background:var(--creme);border:1px solid var(--or-pale);box-shadow:0 24px 60px -36px rgba(81,31,38,.5)}
  .programme-inner{padding:clamp(2rem,5vw,3.5rem) clamp(1.2rem,5vw,4rem)}
  .programme-head{text-align:center;padding-bottom:1.4rem}
  .programme-head .script{font-size:clamp(2.2rem,5vw,3rem);color:var(--rose);display:block;margin-top:.2rem}
  .acte{display:grid;grid-template-columns:8.5rem 1fr;gap:1.6rem;padding:1.8rem 0;border-bottom:1px dashed var(--or-pale);align-items:baseline}
  .acte:last-child{border-bottom:none}
  .acte .label{font-family:'Pinyon Script',cursive;font-size:1.7rem;color:var(--or)}
  .acte .heure{font-size:.74rem;letter-spacing:.26em;color:var(--bordeaux);font-weight:500;margin-bottom:.2rem}
  .acte h4{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:600;margin-bottom:.3rem}
  .acte p{font-size:.95rem;max-width:36rem}
  .acte .note{display:inline-block;margin-top:.55rem;background:var(--rose-pale);padding:.3rem .9rem;font-size:.8rem;color:var(--bordeaux-deep);border-radius:99px}
  @media(max-width:640px){.acte{grid-template-columns:1fr;gap:.3rem;padding:1.4rem 0}}

  /* ============ INFOS ============ */
  .infos{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(235px,100%),1fr));gap:1.2rem;margin-top:2.4rem}
  .info-card{background:var(--creme);border:1px solid var(--or-pale);padding:1.7rem;position:relative}
  .info-card::before{content:"";position:absolute;top:0;left:1.7rem;right:1.7rem;height:3px;background:linear-gradient(90deg,var(--rose),var(--or),var(--sauge))}
  .info-card h4{font-size:1.3rem;color:var(--bordeaux);margin-bottom:.45rem}
  .info-card p{font-size:.92rem}

  /* ============ FORMULAIRES ============ */
  .form-card{background:var(--creme);border:1px solid var(--or-pale);padding:clamp(1.4rem,4vw,3rem);box-shadow:0 24px 60px -36px rgba(81,31,38,.5)}
  .field{margin-bottom:1.5rem}
  label{display:block;font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:var(--bordeaux);margin-bottom:.5rem;font-weight:500}
  input[type=text],input[type=number],textarea{width:100%;border:1px solid var(--or-pale);background:var(--ivoire);padding:.85rem 1rem;font-family:'Jost',sans-serif;font-size:1rem;font-weight:300;color:var(--ink);border-radius:2px}
  input:focus-visible,textarea:focus-visible{outline:2px solid var(--or);outline-offset:1px}
  textarea{min-height:110px;resize:vertical}
  .choices{display:flex;gap:.7rem;flex-wrap:wrap}
  .choice{flex:1;min-width:min(140px,100%)}
  .choice input{position:absolute;opacity:0}
  .choice span{display:block;text-align:center;border:1px solid var(--or-pale);padding:.85rem 1rem;cursor:pointer;font-size:.92rem;transition:all .2s;background:var(--ivoire);border-radius:2px}
  .choice input:checked + span{background:var(--bordeaux);color:var(--creme);border-color:var(--bordeaux)}
  .choice input:focus-visible + span{outline:2px solid var(--or)}
  .feedback{margin-top:1.2rem;padding:1rem 1.2rem;font-size:.95rem;display:none;border-radius:2px}
  .feedback.ok{display:block;background:#EFF5EA;border:1px solid var(--sauge);color:#41522F}
  .feedback.err{display:block;background:#FBEDEA;border:1px solid var(--rose);color:#7C3127}
  .privacy{font-size:.8rem;color:#8A6F72;margin-top:1rem}

  /* ============ LIVRE D'OR ============ */
  .guest-entries{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(280px,100%),1fr));gap:1rem;margin-top:2.4rem}
  .entry{background:var(--creme);border:1px solid var(--or-pale);padding:1.5rem 1.6rem;position:relative}
  .entry::before{content:"❝";position:absolute;top:.4rem;right:1rem;font-size:2.4rem;color:var(--rose-pale);font-family:serif}
  .entry .who{font-family:'Pinyon Script',cursive;font-size:1.5rem;color:var(--bordeaux);margin-bottom:.2rem}
  .entry p{font-size:.95rem}
  .empty-state{font-style:italic;color:#9B7E82;font-family:'Cormorant Garamond',serif;font-size:1.2rem}

  /* ============ ADMIN ============ */
  details.admin{margin-top:3.2rem;border-top:1px dashed var(--or-pale);padding-top:1.4rem}
  details summary{cursor:pointer;font-size:.76rem;letter-spacing:.2em;text-transform:uppercase;color:#A1858A}
  table{width:100%;border-collapse:collapse;margin-top:1.2rem;font-size:.86rem;background:var(--creme)}
  th,td{border:1px solid var(--or-pale);padding:.55rem .7rem;text-align:left;vertical-align:top}
  th{background:var(--rose-pale);font-weight:500;letter-spacing:.08em;font-size:.72rem;text-transform:uppercase;color:var(--bordeaux-deep)}
  .stats{display:flex;gap:1rem;flex-wrap:wrap;margin-top:1.2rem}
  .stat{background:var(--rose-pale);padding:.8rem 1.4rem;text-align:center;border-radius:2px}
  .stat b{display:block;font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--bordeaux)}
  .stat span{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase}

  footer{background:var(--bordeaux);color:var(--rose-pale);text-align:center;padding:4rem 6vw 3rem;margin-top:3rem}
  footer .script{font-size:clamp(2.4rem,6vw,3.4rem);color:var(--creme)}
  footer p{font-size:.82rem;letter-spacing:.2em;margin-top:.7rem}

  @media (prefers-reduced-motion: no-preference){
    .reveal{opacity:0;transform:translateY(20px);transition:opacity .8s ease,transform .8s ease}
    .reveal.in{opacity:1;transform:none}
  }
</style>
</head>
<body>

<script>
/* Garde-fou navigation : intercepte tout clic sur lien interne avant le navigateur, même si le script principal échoue */
document.addEventListener('click', function(e){
  const a = e.target.closest ? e.target.closest('a[href^="#"]') : null;
  if(!a) return;
  e.preventDefault();
  e.stopPropagation();
  const target = document.querySelector(a.getAttribute('href'));
  if(target) target.scrollIntoView({behavior:'smooth'});
  const menu = document.getElementById('menu');
  if(menu) menu.classList.remove('open');
  const b = document.querySelector('.burger');
  if(b){ b.classList.remove('open'); b.setAttribute('aria-expanded','false'); }
}, true);
</script>

<!-- ====== MOTIFS FLORAUX ====== -->

<nav>
  <div class="mono">E&amp;G</div>
  <div style="display:flex;align-items:center;gap:.8rem">
    <div class="lang-switch" role="group" aria-label="Langue / Idioma">
      <button id="btn-fr" class="active" onclick="setLang('fr')">FR</button>
      <button id="btn-es" onclick="setLang('es')">ES</button>
    </div>
    <button class="edit-pencil" onclick="toggleCodePop()" aria-label="Espace des mariés — mode édition" title="Espace des mariés">✎</button>
    <button class="burger" aria-label="Menu" aria-expanded="false" onclick="toggleMenu(this)"><span></span><span></span><span></span></button>
  </div>
  <ul id="menu">
    <li><a href="#histoire" data-i18n="nav_histoire"></a></li>
    <li><a href="#programme" data-i18n="nav_programme"></a></li>
    <li><a href="#opera" data-i18n="nav_opera"></a></li>
    <li><a href="#rsvp">RSVP</a></li>
    <li><a href="#annonces" data-i18n="nav_annonces"></a></li>
    <li><a href="#livredor" data-i18n="nav_livredor"></a></li>
  </ul>
</nav>

<div id="code-pop">
  <label for="code-input" data-i18n="edit_prompt" style="margin-bottom:0"></label>
  <input type="password" id="code-input" autocomplete="off">
  <button onclick="checkCode()" data-i18n="edit_enter"></button>
  <span id="code-msg"></span>
</div>

<!-- ====== HERO : carte d'invitation effet Apple ====== -->
<div class="hero-zone" id="hero-zone">

function toggleCodePop(){
  const p = document.getElementById('code-pop');
  p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
  if(p.style.display === 'flex') document.getElementById('code-input').focus();

function checkCode(){
  const v = document.getElementById('code-input').value.trim();
  const m = document.getElementById('code-msg');
  if(v === EDIT_CODE){
    document.getElementById('code-pop').style.display = 'none';
    document.getElementById('code-input').value = ''; m.textContent = '';
    enterEdit();
  }else{
    m.textContent = t('edit_badcode');
  }
}

});

function enterEdit(){
  editing = true;
  document.body.classList.add('editing');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    if(el.closest('nav') || el.tagName === 'BUTTON' || el.tagName === 'A' || el.closest('#code-pop')) return;
    el.setAttribute('contenteditable','true');
  });
  const b = document.createElement('div');
  b.id = 'edit-banner';
  const label = document.createElement('span'); label.id = 'edit-banner-label'; label.textContent = t('edit_banner');
  const save = document.createElement('button'); save.textContent = t('edit_save'); save.onclick = saveEdits;
  const quit = document.createElement('button'); quit.className = 'ghost'; quit.textContent = t('edit_quit'); quit.onclick = () => exitEdit(true);
  b.appendChild(label); b.appendChild(save); b.appendChild(quit);
  document.body.appendChild(b);
}
async function saveEdits(){
  document.querySelectorAll('[contenteditable="true"]').forEach(el => {
    const k = el.dataset.i18n;
    if(!k) return;
    const txt = el.textContent.trim();
    if(txt && txt !== I18N[lang][k]){
      overrides[lang] = overrides[lang] || {};
      overrides[lang][k] = txt;
      I18N[lang][k] = txt;
    }
  });
  const label = document.getElementById('edit-banner-label');
  try{
    if(!hasStorage) throw new Error('no-storage');
    await window.storage.set('content-overrides', JSON.stringify(overrides), true);
    if(label) label.textContent = t('edit_saved');
    setTimeout(() => exitEdit(false), 1600);
  }catch(e){
    if(label) label.textContent = t('ann_err');
  }
}
function exitEdit(revert){
  editing = false;
  document.body.classList.remove('editing');
  document.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  const b = document.getElementById('edit-banner'); if(b) b.remove();
  if(revert) setLang(lang); /* restaure les textes officiels si on quitte sans enregistrer */
}
async function loadOverrides(){
  try{
    const r = await window.storage.get('content-overrides', true);
    if(r && r.value){
      overrides = JSON.parse(r.value);
      ['fr','es'].forEach(l => { if(overrides[l]) Object.assign(I18N[l], overrides[l]); });
      setLang(lang);
    }
  }catch(e){ /* pas encore de modifications : normal */ }
}

  if(!title || !txt){ show('post-feedback','err', t('ann_need')); return; }

  }

async function removePost(key){
  try{
    await window.storage.delete(key, true);
    loadPosts();
  }catch(e){}
}
async function loadPosts(){
  if(!hasStorage) return;
  try{
    const res = await window.storage.list('post:', true);
    const keys = (res && res.keys) ? res.keys : [];
    const posts = [];
    for(const k of keys){
      try{
        const item = await window.storage.get(k, true);
        if(item && item.value){ const p = JSON.parse(item.value); p._key = k; posts.push(p); }
      }catch(e){}
    }
    posts.sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const box = document.getElementById('posts');
    if(posts.length === 0) return;
    box.innerHTML = '';
    for(const p of posts){
      const div = document.createElement('div');
      div.className = 'entry';
      const d = document.createElement('div'); d.className = 'post-date';
      d.textContent = new Date(p.date).toLocaleDateString(lang === 'es' ? 'es-ES' : 'fr-FR', {day:'numeric', month:'long', year:'numeric'});

      del.textContent = t('post_del');
      del.onclick = () => removePost(p._key);
      div.appendChild(del);
      box.appendChild(div);
    }
  }catch(e){}
}

let currentSlot = null;
function slotClick(id){
  if(!editing) return;
  currentSlot = id;
  document.getElementById('slot-file').click();
}
function resizeImage(file){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const max = 1400;
      let w = img.width, h = img.height;
      if(Math.max(w,h) > max){ const r = max / Math.max(w,h); w = Math.round(w*r); h = Math.round(h*r); }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg', .82));
    };
    img.onerror = reject;
    img.src = url;
  });
}
async function slotFileChosen(ev){
  const f = ev.target.files[0];
  ev.target.value = '';
  if(!f || !currentSlot) return;
  try{
    const data = await resizeImage(f);
    if(data.length > 4800000){ show('photo-feedback','err', t('img_toobig')); return; }
    if(!hasStorage) throw new Error('no-storage');
    await window.storage.set('photo:' + currentSlot, data, true);
    renderSlot(currentSlot, data);
    show('photo-feedback','ok', t('gal_ok'));
  }catch(e){
    show('photo-feedback','err', t('gal_err'));
  }
}
function renderSlot(id, data){
  const ph = document.getElementById(id);
  ph.innerHTML = '';
  const im = document.createElement('img');
  im.src = data; im.alt = '';
  ph.appendChild(im);
}
async function loadSlotPhotos(){
  for(const id of ['photo-1','photo-2','photo-3']){
    try{
      const r = await window.storage.get('photo:' + id, true);
      if(r && r.value) renderSlot(id, r.value);
    }catch(e){ /* pas encore de photo : normal */ }
  }
}

/* ================= CARTE EFFET APPLE ================= */
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const card = document.getElementById('invite-card');
const heroZone = document.getElementById('hero-zone');
let ticking = false;
function appleScroll(){
  if(reduceMotion){ return; }
  const zoneH = heroZone.offsetHeight - window.innerHeight;
  const progress = Math.min(Math.max(window.scrollY / Math.max(zoneH,1), 0), 1);
  /* phase 1 (0 → .35) : la carte grandit de .9 à 1 ; phase 2 (.55 → 1) : elle rétrécit à .8 et s'estompe */
  let scale, opacity = 1, ty = 0;
  if(progress < .35){
    const p = progress / .35;
    scale = .9 + .1 * easeOut(p);
  }else if(progress < .55){
    scale = 1;
  }else{
    const p = (progress - .55) / .45;
    scale = 1 - .2 * easeIn(p);
    opacity = 1 - .85 * p;
    ty = -40 * p;
  }
  card.style.transform = 'scale(' + scale.toFixed(4) + ') translateY(' + ty.toFixed(1) + 'px)';
  card.style.opacity = opacity.toFixed(3);
  const hint = document.querySelector('.scroll-hint');
  if(hint) hint.style.opacity = Math.max(0, .75 - progress * 2.4);
  ticking = false;
}
function easeOut(p){ return 1 - Math.pow(1 - p, 3); }
function easeIn(p){ return p * p; }
window.addEventListener('scroll', () => {
  if(!ticking){ requestAnimationFrame(appleScroll); ticking = true; }
}, {passive:true});
appleScroll();

async function loadRsvps(){
  if(!hasStorage) return;
  try{
    const res = await window.storage.list('rsvp:', true);
    const keys = (res && res.keys) ? res.keys : [];
    const rows = [];
    for(const k of keys){
      try{
        const item = await window.storage.get(k, true);
        if(item && item.value) rows.push(JSON.parse(item.value));
      }catch(e){}
    }
    rows.sort((a,b) => (a.date||'').localeCompare(b.date||''));
    const tbody = document.querySelector('#rsvp-table tbody');
    tbody.innerHTML = '';
    let pers = 0, tab = 0;
    for(const r of rows){
      const tr = document.createElement('tr');
      [r.nom, trVal(r.presence), r.nb, r.tablette === 'oui' ? r.nb : '0', r.regime || '—', r.message || '—'].forEach(v => {
        const td = document.createElement('td'); td.textContent = v; tr.appendChild(td);
      });
      tbody.appendChild(tr);
      if(r.presence === 'oui'){ pers += parseInt(r.nb)||0; if(r.tablette === 'oui') tab += parseInt(r.nb)||0; }
    }
    document.getElementById('stats').innerHTML =
      '<div class="stat"><b>'+rows.length+'</b><span>'+t('stat_rep')+'</span></div>'+
      '<div class="stat"><b>'+pers+'</b><span>'+t('stat_pers')+'</span></div>'+
      '<div class="stat"><b>'+tab+'</b><span>'+t('stat_tab')+'</span></div>';
  }catch(e){}
}

/* ================= LIVRE D'OR ================= */
async function submitGuestbook(){
  const nom = document.getElementById('g-nom').value.trim();
  const msg = document.getElementById('g-msg').value.trim();
  if(!nom || !msg){ show('guest-feedback','err', t('lo_need')); return; }
  const btn = document.getElementById('guest-btn');
  btn.disabled = true; btn.textContent = t('lo_btn_sending');
  try{
    if(!hasStorage) throw new Error('no-storage');
    await window.storage.set('guestbook:' + uid(), JSON.stringify({nom, msg, date:new Date().toISOString()}), true);
    document.getElementById('g-nom').value = ''; document.getElementById('g-msg').value = '';
    show('guest-feedback','ok', t('lo_ok'));
    loadGuestbook();
  }catch(e){
    show('guest-feedback','err', t('lo_err'));
  }finally{
    btn.disabled = false; btn.textContent = t('lo_btn');
  }
}

async function loadGuestbook(){
  if(!hasStorage) return;
  try{
    const res = await window.storage.list('guestbook:', true);
    const keys = (res && res.keys) ? res.keys : [];
    const entries = [];
    for(const k of keys){
      try{
        const item = await window.storage.get(k, true);
        if(item && item.value) entries.push(JSON.parse(item.value));
      }catch(e){}
    }
    entries.sort((a,b) => (b.date||'').localeCompare(a.date||''));
    const box = document.getElementById('guest-entries');
    if(entries.length === 0) return;
    box.innerHTML = '';
    for(const e of entries){
      const div = document.createElement('div');
      div.className = 'entry';
      const who = document.createElement('div'); who.className = 'who'; who.textContent = e.nom;
      const p = document.createElement('p'); p.textContent = e.msg;
      div.appendChild(who); div.appendChild(p);
      box.appendChild(div);
    }
  }catch(e){}
}

/* ================= INIT ================= */
setLang('fr');
loadGuestbook();
loadPosts();
if(hasStorage){ loadOverrides(); loadSlotPhotos(); loadGalleryPhotos(); loadSections(); }
