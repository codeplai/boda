server {
    listen       80;
    server_name  boda.isoftesan.dev;

    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache corto para poder actualizar la web sin esperas largas
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Cache media and static assets (images, fonts, scripts, stylesheets)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Handle server error pages
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
