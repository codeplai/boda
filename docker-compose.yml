services:
  boda:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: boda-isoftesan:latest
    container_name: boda-isoftesan
    restart: unless-stopped
    networks:
      - edge
    # Traefik enruta por la red interna (boda.isoftesan.dev), no hace falta publicar puerto.
    # Para probar local sin Traefik, descomenta y usa un puerto libre (ej. 8082:80).
    # ports:
    #   - "8082:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.boda.rule=Host(`boda.isoftesan.dev`)"
      - "traefik.http.routers.boda.tls.certresolver=cf"
      - "traefik.http.services.boda.loadbalancer.server.port=80"

networks:
  edge:
    external: true
