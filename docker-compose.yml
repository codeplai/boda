services:
  boda:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: boda-isoftesan:latest
    container_name: boda-isoftesan
    restart: unless-stopped
    networks:
      - edge
    # Publicar 8080 es opcional (solo para probar local). Traefik enruta por la red interna.
    ports:
      - "8080:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.boda.rule=Host(`boda.isoftesan.dev`)"
      - "traefik.http.routers.boda.tls.certresolver=cf"
      - "traefik.http.services.boda.loadbalancer.server.port=80"

networks:
  edge:
    external: true
